<div class="pomodoro">
    <h1 id="pomodoro-title" class="pomodoro-title">{{ header() }}</h1>
    <div class="pomodoro-display">
        <div id="pomodoro-timer" class="pomodoro-display__timer">{{ minutes() }}:{{ seconds() }}</div>
        <div id="pomodoro-number-cycles" class="pomodoro-display__cycles">Number of cycles done: {{ numberOfCycles() }}</div>
    </div>
    <div class="pomodoro-buttons">
        @if (isWaitingForConfirmation()) {
            <button id="pomodoro-button-next" class="pomodoro-button"(click)="onNext()">
                <svg appSVG class="pomodoro-button__icon" icon="next"></svg>
            </button>
            <button id="pomodoro-button-increase-by-5" class="pomodoro-button" [disabled]="true">
                <span class="pomodoro-button__text">+5</span>
            </button>
            <button id="pomodoro-button-increase-by-15" class="pomodoro-button" [disabled]="true">
                <span class="pomodoro-button__text">+15</span>
            </button>
        }
        @else if (!timerDecrementing()) {
            <button id="pomodoro-button-start" class="pomodoro-button" (click)="onStart()">
                <svg appSVG class="pomodoro-button__icon" icon="play"></svg>
            </button>
            <button id="pomodoro-button-rewind" class="pomodoro-button" (click)="onRewind()">
                <svg appSVG class="pomodoro-button__icon" icon="rewind"></svg>
            </button>
            <button id="pomodoro-button-reset" class="pomodoro-button" (click)="onReset()">
                <svg appSVG class="pomodoro-button__icon" icon="reset"></svg>
            </button>
        }
        @else {
            <button id="pomodoro-button-pause" class="pomodoro-button" (click)="onStop()">
                <svg appSVG id="pomodoro-button-pause" class="pomodoro-button__icon" icon="pause"></svg>
            </button>
            @if (cycleState() === 'work') {
                <button id="pomodoro-button-increase-by-5" class="pomodoro-button" (click)="onIncrement(5)">
                    <span class="pomodoro-button__text">+5</span>
                </button>
                <button id="pomodoro-button-increase-by-15" class="pomodoro-button" (click)="onIncrement(15)">
                    <span class="pomodoro-button__text">+15</span>
                </button>
            }
            @else {    
                <button id="pomodoro-button-next" class="pomodoro-button"  (click)="onNext()">
                    <svg appSVG class="pomodoro-button__icon" icon="next"></svg>
                </button>
                <button id="pomodoro-button-increase-by-5" class="pomodoro-button" [disabled]="true">
                    <span class="pomodoro-button__text">+5</span>
                </button>
            }
        }
        <button id="pomodoro-button-settings" class="pomodoro-button" [disabled]="timerStarted()" (click)="onSettings()">
            <svg appSVG class="pomodoro-button__icon" icon="settings"></svg>
        </button>
    </div>
</div>
