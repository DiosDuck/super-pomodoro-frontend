<div class="form-page">
    <h3 class="form-page-info">Caution! On success you will be forced to sign back in!</h3>
    <form class="form-page-form" [formGroup]="changePasswordForm" (submit)="onSubmit()">
        <app-form-input label="Old Password" inputId="oldPassword">
            <input id="oldPassword" type="password" [class.invalid]="invalid.oldPassword()" formControlName="oldPassword" placeholder="Old Password" autocomplete="off">
        </app-form-input>
        <app-form-input label="New Password" inputId="newPassword">
            <input id="newPassword" type="password" [class.invalid]="invalid.newPassword()" formControlName="newPassword" placeholder="New Password" autocomplete="off">
        </app-form-input>
        <app-form-input label="Confirm Password" inputId="confirmPassword">
            <input id="confirmPassword" type="password" [class.invalid]="invalid.confirmPassword()" formControlName="confirmPassword" placeholder="Confirm Password" autocomplete="off">
        </app-form-input>
        <div class="form-page-form__buttons">
            <app-form-button type="submit" buttonId="form-button-submit" buttonStyle="primary" [disabled]="!canSubmit()">Update Password</app-form-button>
        </div>
    </form>
</div>
