<div class="toast-line" [class.toast-line--closing]="isClosed()">
    <svg appSVG class="toast-line__icon" (click)="onClose()" [icon]="icon()"></svg>
    <span class="toast-line__message">{{toast().message}}</span>
    <svg appSVG class="toast-line__icon toast-line__icon--close" (click)="onClose()" icon="close"></svg>
</div>
