<div class="nav-bubble" [class.nav-bubble--active]="isActivating()">
    <button class="nav-bubble-hamburger" (click)="toggle()">
        <svg appSVG class="nav-bubble-hamburger__icon" [icon]="currentIcon()"></svg>
    </button>
    @if (this.isDisplayed()) {
        <div class="nav-bubble-list" [class.nav-bubble-list--show]="isSelected()">
            <ng-content />
        </div>
    }
</div>
