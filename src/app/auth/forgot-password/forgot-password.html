<div class="form-page">
    <h1 class="form-page-title">Forgot your password?</h1>
    <form class="form-page-form" [formGroup]="forgotPasswordForm" (submit)="onSubmit()">
        <app-form-input label="Username" inputId="username">
            <input id="username" type="username" formControlName="username" placeholder="Username" autocomplete="off">
        </app-form-input>
        <div class="form-page-form__buttons"> 
            <app-form-button type="button" buttonId="form-button-back" buttonStyle="secondary" (onClick)="onBack()">Go back</app-form-button>
            <app-form-button type="submit" buttonId="form-button-submit" buttonStyle="primary" [disabled]="!forgotPasswordForm.valid && !isWaiting">Send mail</app-form-button>
        </div>
    </form>
</div>
