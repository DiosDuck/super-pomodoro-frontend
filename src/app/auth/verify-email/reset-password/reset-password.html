<div class="form-page">
    <h1 class="form-page-title">Reset Password</h1>
    <form class="form-page-form" [formGroup]="resetPasswordForm" (submit)="onSubmit()">
        <app-form-input label="New Password" inputId="password">
            <input id="password" type="password" [class.invalid]="isInvalid('password')" formControlName="password" placeholder="New Password" autocomplete="off">
        </app-form-input>
        <app-form-input label="Confirm Password" inputId="confirmPassword">
            <input id="confirmPassword" type="confirmPassword" [class.invalid]="isInvalid('confirmPassword')" formControlName="confirmPassword" placeholder="Confirm Password" autocomplete="off">
        </app-form-input>
        <div class="form-page-form__buttons">
            <app-form-button type="submit" buttonId="form-button-submit" buttonStyle="danger" [disabled]="!resetPasswordForm.valid && !isWaiting">Update Password</app-form-button>
        </div>
    </form>
</div>
